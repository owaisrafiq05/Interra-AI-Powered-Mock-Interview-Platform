# Copy to interra-server-secret (Opaque) in your cluster. Do not commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: interra-server-secret
type: Opaque
stringData:
  # Server also accepts legacy key MONGO_URI if you prefer.
  MONGODB_URI: "mongodb+srv://USER:PASS@cluster/interra"
  ACCESS_TOKEN_SECRET: "replace-with-long-random-string"
  ACCESS_TOKEN_EXPIRY: "15d"
  GEMINI_API_KEY: ""
  OPENAI_API_KEY: ""
  # openai (default in production) | local (needs Python whisper+ffmpeg in image)
  TRANSCRIPTION_PROVIDER: "openai"
  GEMINI_MODEL: "gemini-2.5-flash"
