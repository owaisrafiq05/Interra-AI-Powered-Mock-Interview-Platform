apiVersion: apps/v1
kind: Deployment
metadata:
  name: interra-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interra-api
  template:
    metadata:
      labels:
        app: interra-api
    spec:
      volumes:
        - name: uploads
          emptyDir: {}
      containers:
        - name: interra-api
          image: your-registry/interra-api:latest
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads
              mountPath: /tmp/interra-uploads
          env:
            - name: PORT
              value: "8000"
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: MONGODB_URI
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: ACCESS_TOKEN_SECRET
            - name: ACCESS_TOKEN_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: ACCESS_TOKEN_EXPIRY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: GEMINI_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: OPENAI_API_KEY
                  optional: true
            - name: TRANSCRIPTION_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: TRANSCRIPTION_PROVIDER
                  optional: true
            - name: GEMINI_MODEL
              valueFrom:
                secretKeyRef:
                  name: interra-server-secret
                  key: GEMINI_MODEL
                  optional: true
            - name: UPLOAD_DIR
              value: "/tmp/interra-uploads"
