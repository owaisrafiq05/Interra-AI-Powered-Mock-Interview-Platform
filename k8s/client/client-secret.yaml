# Browser must reach the public API URL (Ingress / LoadBalancer), not an in-cluster DNS name.
# Example: https://api.your-domain.com/api/v1
# echo -n 'https://api.your-domain.com/api/v1' | base64 -w0
apiVersion: v1
kind: Secret
metadata:
  name: interra-web-secret
type: Opaque
stringData:
  NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
